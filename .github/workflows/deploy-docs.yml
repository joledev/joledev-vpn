name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'Dockerfile.docs'
      - 'nginx.docs.conf'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push docs image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.docs
          push: true
          tags: |
            ghcr.io/joledev/joledev-vpn-docs:latest
            ghcr.io/joledev/joledev-vpn-docs:${{ github.sha }}

      - name: Deploy to K3s
        uses: appleboy/ssh-action@v1
        with:
          host: 69.62.68.130
          username: joel
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script_stop: true
          script: |
            kubectl set image deployment/vpn-docs nginx=ghcr.io/joledev/joledev-vpn-docs:${{ github.sha }} -n joledev-vpn
            kubectl rollout status deployment/vpn-docs -n joledev-vpn --timeout=60s
